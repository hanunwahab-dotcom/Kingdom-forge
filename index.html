<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⚔️ Kingdom Forge</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0a06;--surface:#1f1a0e;--surface2:#2a2210;--border:#4a3a1a;--border2:#6b5520;--gold:#d4a017;--gold2:#f0c84a;--red:#8b1a1a;--red2:#c0392b;--green2:#27ae60;--text:#e8d5a0;--muted:#8a7550;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;min-height:100vh;overflow-x:hidden;}
header{background:linear-gradient(180deg,#1a1000,var(--bg));border-bottom:2px solid var(--border2);padding:10px 16px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.8);}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.game-title{font-family:'Cinzel',serif;font-size:20px;font-weight:900;color:var(--gold2);letter-spacing:2px;}
.game-title small{color:var(--muted);font-weight:400;font-size:11px;display:block;letter-spacing:3px;}
.resources{display:flex;gap:6px;flex-wrap:wrap;}
.res{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;flex:1;min-width:80px;}
.res-icon{font-size:20px;}
.res-val{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--gold2);line-height:1;}
.res-lbl{font-size:11px;color:var(--muted);margin-top:1px;}
.tab-bar{display:flex;gap:2px;padding:0 12px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:118px;z-index:90;overflow-x:auto;}
.tab-btn{padding:10px 14px;background:transparent;border:none;border-bottom:3px solid transparent;color:var(--muted);font-family:'Cinzel',serif;font-size:12px;cursor:pointer;transition:all 0.2s;white-space:nowrap;flex-shrink:0;}
.tab-btn.active{color:var(--gold2);border-bottom-color:var(--gold2);}
.tab-btn:hover:not(.active){color:var(--text);}
.tab-content{display:none;padding:16px;}
.tab-content.active{display:block;}
.sec-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}
.king-bar{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,rgba(212,160,23,0.08),transparent);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;margin-bottom:14px;}
.king-xp-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px;width:120px;}
.king-xp-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width 0.5s;}
.village-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.building-slot{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;transition:all 0.2s;min-height:110px;justify-content:center;}
.building-slot:not(.locked):hover{border-color:var(--gold);transform:translateY(-2px);}
.building-slot.locked{opacity:0.4;filter:grayscale(1);cursor:pointer;}
.building-icon{font-size:32px;margin-bottom:4px;}
.building-name{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);font-weight:600;}
.building-level{font-size:10px;color:var(--muted);margin-top:1px;}
.building-prod{font-size:9px;color:var(--green2);margin-top:3px;background:rgba(39,174,96,0.1);padding:1px 5px;border-radius:3px;}
.building-locked-cost{font-size:9px;color:var(--muted);margin-top:3px;}
.ring-btn{position:absolute;bottom:5px;right:5px;width:28px;height:28px;border-radius:50%;background:var(--surface2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:transform 0.15s;}
.ring-btn:hover{transform:scale(1.15);}
.ring-btn svg{position:absolute;top:0;left:0;width:28px;height:28px;transform:rotate(-90deg);pointer-events:none;}
.ring-btn svg circle{fill:none;stroke-width:3;}
.unit-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.unit-icon{font-size:28px;}
.unit-info{flex:1;}
.unit-name{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);}
.unit-count{font-size:15px;color:var(--text);font-weight:700;}
.unit-cost{font-size:11px;color:var(--muted);}
.unit-btns{display:flex;flex-direction:column;gap:4px;align-items:flex-end;}
.buy-row{display:flex;gap:4px;}
.buy-btn{background:var(--red);border:1px solid var(--red2);color:var(--text);font-family:'Cinzel',serif;font-size:10px;padding:5px 8px;border-radius:6px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.buy-btn:hover{background:var(--red2);}
.buy-btn:disabled{opacity:0.4;cursor:not-allowed;}
.custom-buy{display:flex;gap:4px;margin-top:2px;}
.custom-buy input{width:65px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Cinzel',serif;font-size:11px;padding:4px 6px;border-radius:5px;outline:none;}
.custom-buy button{background:var(--surface2);border:1px solid var(--border2);color:var(--gold);font-family:'Cinzel',serif;font-size:10px;padding:4px 10px;border-radius:5px;cursor:pointer;}
.enemy-card{background:linear-gradient(135deg,#1a0505,#0d0000);border:2px solid #5a1a1a;border-radius:10px;padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.2s;margin-bottom:10px;}
.enemy-card:hover{border-color:var(--red2);box-shadow:0 0 16px rgba(192,57,43,0.2);}
.enemy-card.defeated{opacity:0.4;cursor:default;}
.enemy-icon{font-size:36px;}
.enemy-info{flex:1;}
.enemy-name{font-family:'Cinzel',serif;font-size:14px;color:#e74c3c;margin-bottom:4px;}
.enemy-hp-bar{height:6px;background:#2a0000;border-radius:3px;overflow:hidden;margin-bottom:4px;}
.enemy-hp-fill{height:100%;background:linear-gradient(90deg,#c0392b,#e74c3c);transition:width 0.5s;}
.enemy-stats{font-size:11px;color:var(--muted);}
.attack-btn{background:linear-gradient(135deg,#8b1a1a,#c0392b);border:1px solid #e74c3c;color:white;font-family:'Cinzel',serif;font-size:12px;padding:8px 12px;border-radius:8px;cursor:pointer;white-space:nowrap;}
.attack-btn:hover{filter:brightness(1.2);}
.upg-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:8px;border:1px solid var(--border);margin-bottom:8px;background:var(--surface2);}
.upg-icon{font-size:22px;}
.upg-info{flex:1;}
.upg-name{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);}
.upg-desc{font-size:11px;color:var(--muted);margin-top:2px;}
.upg-cost{font-size:11px;color:var(--gold2);margin-top:2px;}
.upg-btn{background:linear-gradient(135deg,var(--gold),#8b6914);border:none;color:#1a0a00;font-family:'Cinzel',serif;font-size:11px;font-weight:700;padding:8px 12px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.upg-btn:hover{filter:brightness(1.2);}
.upg-btn:disabled{opacity:0.4;cursor:not-allowed;filter:none;}
.quest-item{padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;background:var(--surface2);}
.quest-name{font-family:'Cinzel',serif;font-size:13px;color:var(--gold2);margin-bottom:4px;}
.quest-desc{font-size:11px;color:var(--muted);margin-bottom:6px;}
.quest-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:4px;}
.quest-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width 0.5s;}
.quest-reward{font-size:11px;color:var(--green2);}
.quest-claim-btn{margin-top:8px;background:linear-gradient(135deg,#1a4a1a,#1a6a1a);border:1px solid var(--green2);color:var(--text);font-family:'Cinzel',serif;font-size:11px;padding:6px 14px;border-radius:6px;cursor:pointer;}
.quest-claim-btn:hover{filter:brightness(1.3);}
.log-area{min-height:200px;font-size:11px;color:var(--muted);line-height:2;}
.log-entry{border-bottom:1px solid rgba(74,58,26,0.3);padding:2px 0;}
.log-entry.good{color:var(--green2);}
.log-entry.bad{color:var(--red2);}
.log-entry.gold{color:var(--gold2);}
.day-transition{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.4s;}
.day-transition.show{opacity:1;pointer-events:all;}
.day-box{text-align:center;background:var(--surface);border:2px solid var(--border2);border-radius:20px;padding:40px 60px;}
.day-from{font-family:'Cinzel',serif;font-size:36px;font-weight:900;color:var(--muted);}
.day-arrow{font-size:28px;color:var(--gold);margin:8px 0;}
.day-to{font-family:'Cinzel',serif;font-size:48px;font-weight:900;color:var(--gold2);text-shadow:0 0 30px rgba(240,200,74,0.5);}
.day-label{font-size:12px;color:var(--muted);letter-spacing:3px;margin-top:8px;}
.quest-notif{position:fixed;top:20px;right:20px;background:linear-gradient(135deg,#1a2a1a,#0d1a0d);border:2px solid var(--green2);border-radius:12px;padding:14px 18px;z-index:400;max-width:260px;transform:translateX(300px);transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);box-shadow:0 4px 20px rgba(0,0,0,0.8);}
.quest-notif.show{transform:translateX(0);}
.qn-title{font-family:'Cinzel',serif;font-size:12px;color:var(--green2);margin-bottom:3px;}
.qn-name{font-size:12px;color:var(--text);margin-bottom:6px;}
.qn-claim{background:linear-gradient(135deg,#1a4a1a,#1a6a1a);border:1px solid var(--green2);color:var(--text);font-family:'Cinzel',serif;font-size:11px;padding:5px 12px;border-radius:6px;cursor:pointer;width:100%;}
.notif{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--gold);border-radius:10px;padding:10px 16px;font-family:'Cinzel',serif;font-size:12px;color:var(--gold2);z-index:300;transform:translateY(80px);transition:transform 0.3s;}
.notif.show{transform:translateY(0);}
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="game-title">⚔️ Kingdom Forge<small>ORTAÇAĞ İMPARATORLUĞU</small></div>
    <div style="font-family:'Cinzel',serif;font-size:12px;color:var(--muted)" id="dayCounter">🌙 Gün 1</div>
  </div>
  <div class="resources">
    <div class="res"><span class="res-icon">🌾</span><div><div class="res-val" id="resFood">50</div><div class="res-lbl">Yiyecek</div></div></div>
    <div class="res"><span class="res-icon">🪵</span><div><div class="res-val" id="resWood">30</div><div class="res-lbl">Tahta</div></div></div>
    <div class="res"><span class="res-icon">🪨</span><div><div class="res-val" id="resStone">20</div><div class="res-lbl">Taş</div></div></div>
    <div class="res"><span class="res-icon">💰</span><div><div class="res-val" id="resGold">100</div><div class="res-lbl">Altın</div></div></div>
    <div class="res"><span class="res-icon">👥</span><div><div class="res-val" id="resPop">10</div><div class="res-lbl">Nüfus</div></div></div>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('kingdom',this)">🏰 Krallık</button>
  <button class="tab-btn" onclick="switchTab('army',this)">⚔️ Ordu</button>
  <button class="tab-btn" onclick="switchTab('enemies',this)">🗡️ Düşman</button>
  <button class="tab-btn" onclick="switchTab('upgrades',this)">⚒️ Yükselt</button>
  <button class="tab-btn" onclick="switchTab('quests',this)">📜 Görev</button>
  <button class="tab-btn" onclick="switchTab('log',this)">📖 Günlük</button>
</div>

<div class="tab-content active" id="tab-kingdom">
  <div class="king-bar">
    <div style="font-size:28px">👑</div>
    <div style="flex:1">
      <div style="font-family:'Cinzel',serif;font-size:13px;color:var(--gold2)">Kral</div>
      <div style="font-size:11px;color:var(--muted)" id="kingTitle">Köy Beyi</div>
      <div class="king-xp-bar"><div class="king-xp-fill" id="kingXpFill" style="width:0%"></div></div>
    </div>
    <div style="font-family:'Cinzel',serif;font-size:12px;color:var(--gold)">Lv.<span id="kingLevel">1</span></div>
  </div>
  <div class="sec-title">🏘️ Binalar</div>
  <div class="village-grid" id="villageGrid"></div>
</div>

<div class="tab-content" id="tab-army">
  <div class="sec-title">⚔️ Birlikler</div>
  <div id="unitList"></div>
</div>

<div class="tab-content" id="tab-enemies">
  <div class="sec-title">🗺️ Düşman Bölgeleri</div>
  <div id="enemyList"></div>
</div>

<div class="tab-content" id="tab-upgrades">
  <div class="sec-title">⚒️ Yükseltmeler</div>
  <div id="upgradeList"></div>
</div>

<div class="tab-content" id="tab-quests">
  <div class="sec-title">📜 Aktif Görevler</div>
  <div id="questList"></div>
</div>

<div class="tab-content" id="tab-log">
  <div class="sec-title">📖 Krallık Günlüğü</div>
  <div class="log-area" id="logArea"></div>
</div>

<div class="day-transition" id="dayTransition">
  <div class="day-box">
    <div class="day-from" id="dtFrom">Gün 1</div>
    <div class="day-arrow">↓</div>
    <div class="day-to" id="dtTo">Gün 2</div>
    <div class="day-label">🌙 YENİ GÜN BAŞLIYOR</div>
  </div>
</div>

<div class="quest-notif" id="questNotif">
  <div class="qn-title">📜 Görev Tamamlandı!</div>
  <div class="qn-name" id="qnName"></div>
  <div style="font-size:10px;color:var(--green2);margin-bottom:6px" id="qnReward"></div>
  <button class="qn-claim" id="qnClaim">🎁 Ödülü Al</button>
</div>
<div class="notif" id="notif"></div>

<script>
const RING_R=11,RING_C=Math.PI*2*RING_R;
const state={
  day:1,tick:0,
  resources:{food:50,wood:30,stone:20,gold:100,pop:10},
  king:{level:1,xp:0,xpNeeded:100},
  boosts:{},
  buildings:[
    {id:'farm',name:'Çiftlik',icon:'🌾',level:1,maxLevel:1000,prod:{food:2},baseCost:{wood:20,stone:10},locked:false,desc:'Yiyecek üretir'},
    {id:'lumber',name:'Kereste',icon:'🪵',level:1,maxLevel:1000,prod:{wood:1},baseCost:{food:15,stone:10},locked:false,desc:'Tahta üretir'},
    {id:'quarry',name:'Taş Ocağı',icon:'🪨',level:1,maxLevel:1000,prod:{stone:1},baseCost:{food:15,wood:20},locked:false,desc:'Taş üretir'},
    {id:'market',name:'Pazar',icon:'🏪',level:1,maxLevel:1000,prod:{gold:3},baseCost:{wood:30,stone:20},locked:false,desc:'Altın üretir'},
    {id:'barracks',name:'Kışla',icon:'⚔️',level:0,maxLevel:1000,prod:{},baseCost:{wood:50,stone:40,gold:30},locked:true,desc:'Asker eğitir'},
    {id:'castle',name:'Kale',icon:'🏰',level:0,maxLevel:500,prod:{},baseCost:{wood:100,stone:80,gold:60},locked:true,desc:'Krallığı korur'},
    {id:'blacksmith',name:'Demirci',icon:'🔨',level:0,maxLevel:1000,prod:{},baseCost:{wood:40,stone:30,gold:20},locked:true,desc:'Silah üretir'},
    {id:'church',name:'Kilise',icon:'⛪',level:0,maxLevel:500,prod:{},baseCost:{wood:60,stone:50,gold:40},locked:true,desc:'Mutluluk artar'},
    {id:'tower',name:'Gözetleme',icon:'🗼',level:0,maxLevel:500,prod:{},baseCost:{wood:80,stone:60,gold:50},locked:true,desc:'Düşman tespiti'},
  ],
  units:[
    {id:'peasant',name:'Köylü',icon:'🧑‍🌾',count:5,baseCost:{food:10,gold:5},power:1,locked:false},
    {id:'soldier',name:'Asker',icon:'🪖',count:0,baseCost:{food:20,gold:15,wood:5},power:5,locked:true},
    {id:'knight',name:'Şövalye',icon:'🏇',count:0,baseCost:{food:40,gold:40,stone:10},power:15,locked:true},
    {id:'archer',name:'Okçu',icon:'🏹',count:0,baseCost:{food:15,gold:10,wood:10},power:8,locked:true},
    {id:'mage',name:'Büyücü',icon:'🧙',count:0,baseCost:{food:30,gold:60,stone:20},power:20,locked:true},
  ],
  enemies:[
    {id:'bandits',name:'Haydutlar',icon:'🗡️',hp:100,maxHp:100,power:3,reward:{gold:20,food:10},respawn:60},
    {id:'wolves',name:'Kurt Sürüsü',icon:'🐺',hp:150,maxHp:150,power:5,reward:{food:30,wood:15},respawn:90},
    {id:'orcs',name:'Ork Kabilesi',icon:'👹',hp:300,maxHp:300,power:12,reward:{gold:60,stone:30},respawn:120},
    {id:'dragon',name:'Ejderha',icon:'🐉',hp:800,maxHp:800,power:30,reward:{gold:200,stone:100},respawn:200},
    {id:'darkking',name:'Karanlık Kral',icon:'💀',hp:500,maxHp:500,power:20,reward:{gold:150,food:80},respawn:150},
  ].map(e=>({...e,defeated:false,respawnTick:0})),
  upgrades:[
    {id:'plow',name:'Saban Geliştir',icon:'🌱',desc:'Çiftlik +50% üretim',baseCost:{gold:50,wood:20},times:0,maxTimes:100,effect:'farm_boost'},
    {id:'sharpaxe',name:'Keskin Balta',icon:'🪓',desc:'Kereste +50% üretim',baseCost:{gold:40,stone:15},times:0,maxTimes:100,effect:'lumber_boost'},
    {id:'ironpick',name:'Demir Kazma',icon:'⛏️',desc:'Taş Ocağı +50% üretim',baseCost:{gold:40,wood:15},times:0,maxTimes:100,effect:'quarry_boost'},
    {id:'roads',name:'Yol İnşaatı',icon:'🛤️',desc:'Altın +2/sn',baseCost:{gold:80,stone:40},times:0,maxTimes:100,effect:'gold_boost'},
    {id:'training',name:'Asker Eğitimi',icon:'🎯',desc:'Birlik gücü +2',baseCost:{gold:100,food:50},times:0,maxTimes:100,effect:'unit_boost'},
    {id:'walls',name:'Kale Surları',icon:'🧱',desc:'Savunma +10',baseCost:{stone:80,gold:60},times:0,maxTimes:50,effect:'defense_boost'},
  ],
  quests:[],
  questPool:[
    {id:'q_gold1',name:'Hazine Peşinde',desc:'200 altın topla',target:'gold',needed:200,reward:{gold:50,food:30}},
    {id:'q_wood1',name:'Kereste Ustası',desc:'80 tahta topla',target:'wood',needed:80,reward:{gold:30,food:20}},
    {id:'q_stone1',name:'Taş Toplayıcı',desc:'60 taş topla',target:'stone',needed:60,reward:{gold:25,wood:30}},
    {id:'q_soldier1',name:'Ordu Kur',desc:'5 asker eğit',target:'soldiers',needed:5,reward:{gold:50}},
    {id:'q_bandits',name:'Haydutları Def',desc:'Haydutları yen',target:'bandits',needed:1,reward:{gold:80,stone:30}},
    {id:'q_wolves',name:'Kurt Avcısı',desc:'Kurt sürüsünü yen',target:'wolves',needed:1,reward:{food:60,gold:40}},
    {id:'q_orcs',name:'Ork Katili',desc:'Ork kabilesini yen',target:'orcs',needed:1,reward:{gold:120,stone:60}},
    {id:'q_pop1',name:'Büyüyen Şehir',desc:'30 nüfusa ulaş',target:'pop',needed:30,reward:{gold:40,food:50}},
    {id:'q_farm5',name:'Çiftçi',desc:'Çiftliği Lv.5 yap',target:'bldg_farm',needed:5,reward:{gold:35,wood:20}},
    {id:'q_gold2',name:'Altın Madeni',desc:'500 altın topla',target:'gold',needed:500,reward:{gold:100,stone:50}},
    {id:'q_knight1',name:'Şövalye Ordusu',desc:'3 şövalye eğit',target:'knights',needed:3,reward:{gold:100,food:60}},
    {id:'q_dragon',name:'Ejderha Avcısı',desc:'Ejderhayı yen',target:'dragon',needed:1,reward:{gold:300,stone:150}},
    {id:'q_king10',name:'Güçlenen Kral',desc:'Kral Lv.10 ol',target:'king_lv',needed:10,reward:{gold:200,food:100}},
  ],
};

function ri(k){return k==='food'?'🌾':k==='wood'?'🪵':k==='stone'?'🪨':'💰';}
function cs(cost){return Object.entries(cost).map(([k,v])=>`${fmt(v)}${ri(k)}`).join(' ');}
function fmt(n){if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.floor(n);}
function canAfford(cost){return Object.entries(cost).every(([k,v])=>(state.resources[k]||0)>=v);}
function spend(cost){Object.entries(cost).forEach(([k,v])=>state.resources[k]-=v);}
function earn(r){Object.entries(r).forEach(([k,v])=>{state.resources[k]=(state.resources[k]||0)+v;});}
function buildCost(b){return Object.fromEntries(Object.entries(b.baseCost).map(([k,v])=>[k,Math.round(v*Math.pow(1.15,b.level))]));}
function upgCost(u){return Object.fromEntries(Object.entries(u.baseCost).map(([k,v])=>[k,Math.round(v*Math.pow(1.5,u.times))]));}
function unitCost(u,qty){return Object.fromEntries(Object.entries(u.baseCost).map(([k,v])=>[k,Math.round(v*qty*(1+u.count*0.01))]));}
function affordPct(cost){const ps=Object.entries(cost).map(([k,v])=>Math.min(1,(state.resources[k]||0)/v));return ps.length?Math.min(...ps):1;}

function showNotif(msg,color='var(--gold2)'){
  const n=document.getElementById('notif');
  n.textContent=msg;n.style.color=color;n.style.borderColor=color;
  n.classList.add('show');clearTimeout(n._t);
  n._t=setTimeout(()=>n.classList.remove('show'),2200);
}
function addLog(msg,type=''){
  const el=document.getElementById('logArea');
  const d=document.createElement('div');
  d.className='log-entry '+type;
  d.textContent=`[Gün ${state.day}] ${msg}`;
  el.prepend(d);
  if(el.children.length>60)el.lastChild.remove();
}
function gainXP(a){
  state.king.xp+=a;
  if(state.king.xp>=state.king.xpNeeded){
    state.king.xp-=state.king.xpNeeded;state.king.level++;
    state.king.xpNeeded=Math.round(state.king.xpNeeded*1.4);
    showNotif(`👑 Seviye atladı! Lv.${state.king.level}`);
    addLog(`Kral Lv.${state.king.level}!`,'gold');
    checkQuests();
  }
}

function generateQuests(){
  const pool=state.questPool.filter(q=>!state.quests.find(aq=>aq.id===q.id&&!aq.claimed));
  const newOnes=pool.sort(()=>Math.random()-0.5).slice(0,5).map(q=>({...q,completed:false,claimed:false}));
  state.quests=[...state.quests.filter(q=>!q.claimed),...newOnes].slice(0,6);
  renderQuests();
}
function getQC(q){
  if(q.target==='gold')return Math.floor(state.resources.gold);
  if(q.target==='wood')return Math.floor(state.resources.wood);
  if(q.target==='stone')return Math.floor(state.resources.stone);
  if(q.target==='pop')return Math.floor(state.resources.pop);
  if(q.target==='soldiers')return state.units.find(u=>u.id==='soldier')?.count||0;
  if(q.target==='knights')return state.units.find(u=>u.id==='knight')?.count||0;
  if(q.target==='bandits')return state.enemies.find(e=>e.id==='bandits')?.defeated?1:0;
  if(q.target==='wolves')return state.enemies.find(e=>e.id==='wolves')?.defeated?1:0;
  if(q.target==='orcs')return state.enemies.find(e=>e.id==='orcs')?.defeated?1:0;
  if(q.target==='dragon')return state.enemies.find(e=>e.id==='dragon')?.defeated?1:0;
  if(q.target==='bldg_farm')return state.buildings.find(b=>b.id==='farm')?.level||0;
  if(q.target==='king_lv')return state.king.level;
  return 0;
}
function checkQuests(){
  state.quests.forEach(q=>{
    if(q.completed||q.claimed)return;
    if(getQC(q)>=q.needed){q.completed=true;showQuestNotif(q);}
  });
  renderQuests();
}
let qQueue=[],qShowing=false;
function showQuestNotif(q){qQueue.push(q);if(!qShowing)procQQ();}
function procQQ(){
  if(!qQueue.length){qShowing=false;return;}
  qShowing=true;const q=qQueue.shift();
  document.getElementById('qnName').textContent=q.name;
  document.getElementById('qnReward').textContent=Object.entries(q.reward).map(([k,v])=>`+${v}${ri(k)}`).join(' ');
  document.getElementById('qnClaim').onclick=()=>{claimQuest(q.id);document.getElementById('questNotif').classList.remove('show');setTimeout(procQQ,400);};
  document.getElementById('questNotif').classList.add('show');
}
function claimQuest(id){
  const q=state.quests.find(x=>x.id===id);
  if(!q||q.claimed)return;
  q.claimed=true;earn(q.reward);
  addLog(`Görev ödülü: ${q.name}!`,'gold');gainXP(30);
  if(state.quests.filter(x=>!x.claimed).length<=1)setTimeout(generateQuests,500);
  renderQuests();
}

function upgradeBuilding(id){
  const b=state.buildings.find(x=>x.id===id);
  if(!b||b.locked||b.level>=b.maxLevel)return;
  const cost=buildCost(b);
  if(!canAfford(cost)){showNotif('Yeterli kaynak yok!','var(--red2)');return;}
  spend(cost);b.level++;
  Object.keys(b.prod).forEach(k=>b.prod[k]=parseFloat((b.prod[k]*1.15).toFixed(4)));
  gainXP(5+Math.floor(b.level/10));checkQuests();renderBuildings();
}
function unlockBuilding(id){
  const b=state.buildings.find(x=>x.id===id);
  if(!b||!b.locked)return;
  if(!canAfford(b.baseCost)){showNotif('Yeterli kaynak yok!','var(--red2)');return;}
  spend(b.baseCost);b.locked=false;b.level=1;
  if(b.id==='barracks'){state.units.find(u=>u.id==='soldier').locked=false;state.units.find(u=>u.id==='archer').locked=false;}
  if(b.id==='castle'){state.units.find(u=>u.id==='knight').locked=false;state.units.find(u=>u.id==='mage').locked=false;}
  addLog(`${b.name} inşa edildi!`,'gold');gainXP(30);
  showNotif(`${b.icon} ${b.name} inşa edildi!`);
  renderBuildings();renderArmy();
}
function recruitUnits(id,qty){
  const u=state.units.find(x=>x.id===id);
  if(!u||u.locked)return;
  const cost=unitCost(u,qty);
  if(!canAfford(cost)){showNotif('Yeterli kaynak yok!','var(--red2)');return;}
  spend(cost);u.count+=qty;
  addLog(`${qty}x ${u.name} eğitildi.`);gainXP(qty*3);
  renderArmy();checkQuests();
}
function recruitCustom(id){
  const inp=document.getElementById('ci_'+id);
  const qty=parseInt(inp?.value)||1;
  if(qty<1||qty>100000){showNotif('1-100000 arası girin!','var(--red2)');return;}
  recruitUnits(id,qty);if(inp)inp.value='';
}
function attackEnemy(id){
  const e=state.enemies.find(x=>x.id===id);
  if(!e||e.defeated)return;
  const power=state.units.reduce((s,u)=>{let p=u.count*u.power;if(state.boosts.unit_boost)p+=u.count*(state.boosts.unit_boost*2);return s+p;},0);
  if(power===0){showNotif('Ordun yok!','var(--red2)');return;}
  const dmg=power*(0.8+Math.random()*0.4);e.hp-=dmg;
  if(e.hp<=0){
    e.hp=0;e.defeated=true;e.respawnTick=state.tick+e.respawn;
    earn(e.reward);addLog(`${e.name} yenildi!`,'good');gainXP(50);
    showNotif(`⚔️ ${e.name} yenildi!`,'var(--green2)');checkQuests();
  } else {
    const edm=e.power*(0.5+Math.random()*0.5);
    state.resources.food=Math.max(0,state.resources.food-edm);
    addLog(`${e.name} saldırdı! -${Math.round(edm)}🌾`,'bad');
  }
  renderEnemies();
}
function doUpgrade(id){
  const u=state.upgrades.find(x=>x.id===id);
  if(!u||u.times>=u.maxTimes)return;
  const cost=upgCost(u);
  if(!canAfford(cost)){showNotif('Yeterli kaynak yok!','var(--red2)');return;}
  spend(cost);u.times++;
  state.boosts[u.effect]=(state.boosts[u.effect]||0)+1;
  addLog(`${u.name} yapıldı! (${u.times}/${u.maxTimes})`,'gold');gainXP(20);
  showNotif(`✅ ${u.name}!`);renderUpgrades();
}

function makeRing(pct,canDo){
  const dash=RING_C*Math.min(1,pct);
  const color=canDo?(pct>=1?'#27ae60':'var(--gold2)'):(pct>=0.5?'#e67e22':'#c0392b');
  return `<svg viewBox="0 0 28 28"><circle cx="14" cy="14" r="${RING_R}" stroke="#333" stroke-width="3"/><circle cx="14" cy="14" r="${RING_R}" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-dasharray="${RING_C}" stroke-dashoffset="${RING_C-dash}"/></svg>`;
}
function renderBuildings(){
  document.getElementById('villageGrid').innerHTML=state.buildings.map(b=>{
    const prodStr=Object.entries(b.prod).map(([k,v])=>`+${fmt(v)}${ri(k)}/s`).join(' ');
    if(b.locked)return `<div class="building-slot locked" onclick="unlockBuilding('${b.id}')"><div class="building-icon">🔒</div><div class="building-name">${b.name}</div><div class="building-locked-cost">${cs(b.baseCost)}</div></div>`;
    const cost=buildCost(b);const maxed=b.level>=b.maxLevel;
    const pct=maxed?1:affordPct(cost);const canDo=!maxed&&canAfford(cost);
    return `<div class="building-slot"><div class="building-icon">${b.icon}</div><div class="building-name">${b.name}</div><div class="building-level">Lv.${fmt(b.level)}</div>${prodStr?`<div class="building-prod">${prodStr}</div>`:''}<button class="ring-btn" onclick="upgradeBuilding('${b.id}')" title="${maxed?'Max':cs(cost)}">${makeRing(pct,canDo)}<span style="position:relative;z-index:1">${maxed?'✓':'⬆'}</span></button></div>`;
  }).join('');
}
function renderArmy(){
  document.getElementById('unitList').innerHTML=state.units.filter(u=>!u.locked||u.count>0).map(u=>`
    <div class="unit-row">
      <div class="unit-icon">${u.icon}</div>
      <div class="unit-info"><div class="unit-name">${u.name}</div><div class="unit-count">×${fmt(u.count)}</div><div class="unit-cost">${cs(u.baseCost)} / birim</div></div>
      <div class="unit-btns">
        <div class="buy-row">
          <button class="buy-btn" onclick="recruitUnits('${u.id}',1)" ${canAfford(unitCost(u,1))?'':'disabled'}>+1</button>
          <button class="buy-btn" onclick="recruitUnits('${u.id}',10)" ${canAfford(unitCost(u,10))?'':'disabled'}>+10</button>
          <button class="buy-btn" onclick="recruitUnits('${u.id}',100)" ${canAfford(unitCost(u,100))?'':'disabled'}>+100</button>
        </div>
        <div class="custom-buy"><input type="number" id="ci_${u.id}" placeholder="Miktar" min="1"><button onclick="recruitCustom('${u.id}')">Al</button></div>
      </div>
    </div>`).join('');
}
function renderEnemies(){
  document.getElementById('enemyList').innerHTML=state.enemies.map(e=>{
    if(e.defeated)return `<div class="enemy-card defeated"><div class="enemy-icon">💀</div><div class="enemy-info"><div class="enemy-name" style="color:var(--muted)">${e.name} — YENİLDİ</div></div></div>`;
    const pct=(e.hp/e.maxHp)*100;
    return `<div class="enemy-card" onclick="attackEnemy('${e.id}')"><div class="enemy-icon">${e.icon}</div><div class="enemy-info"><div class="enemy-name">${e.name}</div><div class="enemy-hp-bar"><div class="enemy-hp-fill" style="width:${pct}%"></div></div><div class="enemy-stats">❤️ ${fmt(e.hp)}/${fmt(e.maxHp)} · 💥 ${e.power} · ${cs(e.reward)}</div></div><button class="attack-btn">⚔️ Saldır!</button></div>`;
  }).join('');
}
function renderUpgrades(){
  document.getElementById('upgradeList').innerHTML=state.upgrades.map(u=>{
    if(u.times>=u.maxTimes)return `<div class="upg-item" style="opacity:0.5"><div class="upg-icon">${u.icon}</div><div class="upg-info"><div class="upg-name">${u.name}</div><div style="font-size:11px;color:var(--green2)">✅ MAX</div></div></div>`;
    const cost=upgCost(u);const canDo=canAfford(cost);
    return `<div class="upg-item"><div class="upg-icon">${u.icon}</div><div class="upg-info"><div class="upg-name">${u.name} (${u.times}/${u.maxTimes})</div><div class="upg-desc">${u.desc}</div><div class="upg-cost">${cs(cost)}</div></div><button class="upg-btn" onclick="doUpgrade('${u.id}')" ${canDo?'':'disabled'}>YAP</button></div>`;
  }).join('');
}
function renderQuests(){
  document.getElementById('questList').innerHTML=state.quests.filter(q=>!q.claimed).map(q=>{
    const cur=Math.min(getQC(q),q.needed);const pct=(cur/q.needed)*100;
    const rStr=Object.entries(q.reward).map(([k,v])=>`+${v}${ri(k)}`).join(' ');
    if(q.completed&&!q.claimed)return `<div class="quest-item" style="border-color:var(--green2)"><div class="quest-name" style="color:var(--green2)">✨ ${q.name}</div><div class="quest-desc">Tamamlandı!</div><div class="quest-reward">🎁 ${rStr}</div><button class="quest-claim-btn" onclick="claimQuest('${q.id}')">Ödülü Al</button></div>`;
    return `<div class="quest-item"><div class="quest-name">${q.name}</div><div class="quest-desc">${q.desc} (${cur}/${q.needed})</div><div class="quest-bar"><div class="quest-fill" style="width:${pct}%"></div></div><div class="quest-reward">🎁 ${rStr}</div></div>`;
  }).join('')||'<div style="color:var(--muted);text-align:center;padding:20px">Görev yükleniyor...</div>';
}
function renderKing(){
  const titles=['Köy Beyi','Derebey','Baron','Kont','Dük','Prens','Kral','İmparator','Efsane'];
  document.getElementById('kingLevel').textContent=state.king.level;
  document.getElementById('kingTitle').textContent=titles[Math.min(Math.floor(state.king.level/10),titles.length-1)];
  document.getElementById('kingXpFill').style.width=(state.king.xp/state.king.xpNeeded*100)+'%';
}
function renderResources(){
  document.getElementById('resFood').textContent=fmt(state.resources.food);
  document.getElementById('resWood').textContent=fmt(state.resources.wood);
  document.getElementById('resStone').textContent=fmt(state.resources.stone);
  document.getElementById('resGold').textContent=fmt(state.resources.gold);
  document.getElementById('resPop').textContent=fmt(state.resources.pop);
  document.getElementById('dayCounter').textContent=`🌙 Gün ${state.day}`;
}
function switchTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

let tickCount=0;
setInterval(()=>{
  tickCount++;state.tick++;
  state.buildings.forEach(b=>{
    if(!b.locked&&b.level>0){
      Object.entries(b.prod).forEach(([k,v])=>{
        let p=v;const bo=state.boosts;
        if(k==='food'&&bo.farm_boost)p*=(1+0.5*bo.farm_boost);
        if(k==='wood'&&bo.lumber_boost)p*=(1+0.5*bo.lumber_boost);
        if(k==='stone'&&bo.quarry_boost)p*=(1+0.5*bo.quarry_boost);
        if(k==='gold'&&bo.gold_boost)p+=bo.gold_boost*2;
        state.resources[k]=(state.resources[k]||0)+p*0.5;
      });
    }
  });
  state.enemies.forEach(e=>{if(e.defeated&&state.tick>=e.respawnTick){e.defeated=false;e.hp=e.maxHp;addLog(`${e.name} geri döndü!`,'bad');}});
  if(tickCount%100===0){
    const od=state.day;state.day++;
    state.resources.pop=Math.min(1000,state.resources.pop+0.3);
    state.resources.food=Math.max(0,state.resources.food-state.resources.pop*0.08);
    checkQuests();
    if(state.day%3===0)generateQuests();
    addLog(`Gün ${state.day} başladı.`);
    const el=document.getElementById('dayTransition');
    document.getElementById('dtFrom').textContent=`Gün ${od}`;
    document.getElementById('dtTo').textContent=`Gün ${state.day}`;
    el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000);
  }
  renderResources();
  if(tickCount%5===0){renderBuildings();renderUpgrades();renderQuests();}
  if(tickCount%10===0){renderArmy();renderEnemies();renderKing();}
},1000);

generateQuests();
addLog('Krallık kuruldu! Binalar sekmesinden başla.','gold');
renderBuildings();renderArmy();renderEnemies();renderUpgrades();renderQuests();renderKing();
</script>
</body>
</html>
